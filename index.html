
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniFlow | Academia Marcos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --sidebar-bg: #f9f9f9;
            --text-main: #1a1a1a;
            --text-muted: #737373;
            --accent: #000000;
            --border: #e5e5e5;
            --card-bg: #ffffff;
            --radius: 12px;
        }

        [data-theme="dark"] {
            --bg: #0a0a0a;
            --sidebar-bg: #121212;
            --text-main: #f5f5f5;
            --text-muted: #a1a1a1;
            --border: #262626;
            --card-bg: #171717;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        /* Sidebar */
        nav {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            font-family: 'Instrument Serif', serif;
        }

        .nav-links { list-style: none; flex-grow: 1; }

        .nav-item {
            padding: 12px 15px;
            margin-bottom: 5px;
            border-radius: var(--radius);
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item.active, .nav-item:hover {
            background-color: var(--border);
            color: var(--text-main);
        }

        /* Main Content */
        main {
            margin-left: 260px;
            flex-grow: 1;
            padding: 60px 80px;
            max-width: 1200px;
        }

        .header-date {
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        h1 {
            font-family: 'Instrument Serif', serif;
            font-size: 3.5rem;
            font-weight: 400;
            margin-bottom: 10px;
        }

        h1 span { font-style: italic; color: var(--text-muted); }

        .subtitle { color: var(--text-muted); margin-bottom: 40px; font-size: 1.1rem; }

        /* Grid de tarjetas */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            padding: 25px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        .stat-label { font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); display: block; margin-bottom: 5px; }
        .stat-value { font-size: 1.8rem; font-weight: 600; }

        .section-container { display: none; animation: fadeIn 0.4s ease; }
        .section-container.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .theme-btn {
            margin-top: auto;
            padding: 12px;
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            nav { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 1px solid var(--border); }
            main { margin-left: 0; padding: 40px 20px; }
        }
    </style>
</head>
<body id="body">

<nav>
    <div class="logo">
        <h2>UniFlow</h2>
    </div>
    <ul class="nav-links">
        <li class="nav-item active" onclick="showSection('dashboard')">Dashboard</li>
        <li class="nav-item" onclick="showSection('materias')">Materias</li>
        <li class="nav-item" onclick="showSection('promedio')">Promedio</li>
    </ul>
    <button class="theme-btn" onclick="toggleTheme()">Cambiar Modo</button>
</nav>

<main>
    <div id="dashboard" class="section-container active">
        <p class="header-date" id="date-now">CARGANDO FECHA...</p>
        <h1>Buenas noches, <span>Marcos</span></h1>
        <p class="subtitle">Tu panel académico. Mantené el foco y organizá tu tiempo.</p>
        
        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">Materias</span>
                <div class="stat-value">2</div>
            </div>
            <div class="stat-card">
                <span class="stat-label">Progreso</span>
                <div class="stat-value">0%</div>
            </div>
        </div>
    </div>

    <div id="materias" class="section-container">
        <h1>Materias</h1>
        <p class="subtitle">Gestión de cursada 2026.</p>
    </div>

    <div id="promedio" class="section-container">
        <h1>Promedio</h1>
        <p class="subtitle">Calculadora de notas y regularidad.</p>
    </div>
</main>

<script>
    function showSection(id) {
        document.querySelectorAll('.section-container').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function toggleTheme() {
        const body = document.getElementById('body');
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
        } else {
            body.setAttribute('data-theme', 'dark');
        }
    }

    // Fecha dinámica
    const now = new Date();
    const options = { weekday: 'long', day: 'numeric', month: 'long' };
    document.getElementById('date-now').innerText = now.toLocaleDateString('es-ES', options).toUpperCase();
</script>

</body>
</html>

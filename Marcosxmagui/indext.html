
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Personal | Asistente IA</title>
    <style>
        :root {
            --bg-color: #050b18;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent-color: #38bdf8;
            --text-color: #e2e8f0;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            background: radial-gradient(circle at top right, #1e293b, #050b18);
            color: var(--text-color);
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 20px 0;
        }

        h1 {
            font-size: 1.8rem;
            color: var(--accent-color);
            letter-spacing: 1px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        h2 {
            font-size: 1.1rem;
            margin-top: 0;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        input[type="checkbox"] {
            accent-color: var(--accent-color);
            width: 18px;
            height: 18px;
        }

        .quick-links {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .quick-links a {
            text-decoration: none;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .quick-links a:hover {
            background: var(--accent-color);
            color: #000;
            transform: translateY(-3px);
        }

        #chat-window {
            height: 250px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .chat-input-container {
            display: flex;
            gap: 10px;
        }

        #ia-input {
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px;
            color: white;
            outline: none;
        }

        .btn-ia {
            background: var(--accent-color);
            border: none;
            border-radius: 10px;
            padding: 0 20px;
            cursor: pointer;
            font-weight: bold;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: transparent;
            border: none;
            color: var(--text-color);
            resize: none;
            font-family: inherit;
            outline: none;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <h1>DASHBOARD PERSONAL</h1>
</header>

<div class="dashboard">
    <div class="card">
        <h2>📌 Pendientes</h2>
        <div class="todo-item"><input type="checkbox"> Estudiar para la facultad</div>
        <div class="todo-item"><input type="checkbox"> Organizar taller de electrónica</div>
        <div class="todo-item"><input type="checkbox"> Testear código de IA</div>
        <div class="todo-item"><input type="checkbox"> Backup de proyectos</div>
    </div>

    <div class="card" style="grid-row: span 2;">
        <h2>✨ Asistente IA</h2>
        <div id="chat-window">
            <p style="color: #888;">Cargando sistema...</p>
        </div>
        <div class="chat-input-container">
            <input type="text" id="ia-input" placeholder="Escribí tu consulta...">
            <button class="btn-ia" id="send-btn">Enviar</button>
        </div>
    </div>

    <div class="card">
        <h2>🚀 Accesos Rápidos</h2>
        <div class="quick-links">
            <a href="https://github.com" target="_blank">GitHub</a>
            <a href="https://aistudio.google.com/" target="_blank">API Key</a>
            <a href="https://bolt.new" target="_blank">Bolt.new</a>
            <a href="https://lovable.dev" target="_blank">Lovable</a>
        </div>
    </div>

    <div class="card">
        <h2>📝 Notas Rápidas</h2>
        <textarea placeholder="Pegá código o ideas acá..."></textarea>
    </div>
</div>

<script type="importmap">
  {
    "imports": {
      "@google/generative-ai": "https://esm.run/@google/generative-ai"
    }
  }
</script>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    // --- PONÉ TU API KEY ENTRE LAS COMILLAS ---
    const API_KEY = "TU_API_KEY_AQUÍ"; 
    
    const genAI = new GoogleGenerativeAI(API_KEY);
    const chatWindow = document.getElementById('chat-window');
    const inputIA = document.getElementById('ia-input');
    const sendBtn = document.getElementById('send-btn');

    // Mensaje inicial
    chatWindow.innerHTML = '<p style="color: #888;">Listo. ¿En qué te ayudo hoy?</p>';

    async function hablarConIA() {
        const prompt = inputIA.value.trim();
        if (!prompt) return;

        if (API_KEY === "TU_API_KEY_AQUÍ") {
            chatWindow.innerHTML += `<p style="color: #ffaa00;">⚠️ Falta configurar la API Key.</p>`;
            return;
        }

        chatWindow.innerHTML += `<div style="margin-top:10px;"><b>Tú:</b> ${prompt}</div>`;
        inputIA.value = "";

        try {
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            const result = await model.generateContent(prompt);
            const response = await result.response;
            const text = response.text();

            chatWindow.innerHTML += `<div style="margin-top:10px; color: var(--accent-color);"><b>IA:</b> ${text}</div>`;
            chatWindow.scrollTop = chatWindow.scrollHeight;
        } catch (error) {
            chatWindow.innerHTML += `<p style="color: #ff4444;">Error de conexión. Revisá la consola (F12).</p>`;
            console.error(error);
        }
    }

    sendBtn.addEventListener('click', hablarConIA);
    inputIA.addEventListener('keypress', (e) => { if (e.key === 'Enter') hablarConIA(); });
</script>

</body>
</html>

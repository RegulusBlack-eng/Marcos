
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Panel de Control</title>
    <style>
        :root {
            --bg-color: #050b18;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent-color: #38bdf8;
            --text-color: #e2e8f0;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            background: radial-gradient(circle at top right, #1e293b, #050b18);
            color: var(--text-color);
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        header { text-align: center; padding: 20px 0; }
        
        .clock {
            font-size: 3rem;
            font-weight: bold;
            color: var(--accent-color);
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
            margin-bottom: 10px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h2 { font-size: 1.1rem; color: var(--accent-color); text-transform: uppercase; margin-top: 0; letter-spacing: 1px; }

        /* Buscador */
        .search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-input {
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px;
            color: white;
            outline: none;
        }

        /* Tareas */
        .todo-item { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        input[type="checkbox"] { accent-color: var(--accent-color); width: 18px; height: 18px; cursor: pointer; }

        /* Links */
        .quick-links { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .quick-links a {
            text-decoration: none; background: rgba(255, 255, 255, 0.05);
            color: var(--text-color); padding: 12px; border-radius: 10px;
            text-align: center; border: 1px solid var(--border-color); transition: 0.3s;
        }
        .quick-links a:hover { background: var(--accent-color); color: #000; transform: translateY(-3px); }

        /* Notas */
        textarea {
            width: 100%; height: 200px; background: transparent;
            border: none; color: var(--text-color); resize: none; outline: none;
            font-size: 1rem; line-height: 1.5;
        }
    </style>
</head>
<body>

<header>
    <div class="clock" id="reloj">00:00:00</div>
    <div style="color: var(--accent-color); opacity: 0.7;">Panel Personal de Trabajo</div>
</header>

<div class="dashboard">
    <div class="card" style="grid-column: span 1;">
        <h2>🔍 Búsqueda Rápida</h2>
        <div class="search-container">
            <input type="text" id="google-search" class="search-input" placeholder="Buscar en Google...">
            <button onclick="buscar('google')" style="cursor:pointer; border-radius:10px; border:none; padding:0 15px;">Go</button>
        </div>
        <div class="search-container">
            <input type="text" id="yt-search" class="search-input" placeholder="Buscar en YouTube...">
            <button onclick="buscar('yt')" style="cursor:pointer; border-radius:10px; border:none; padding:0 15px; background:#ff0000; color:white;">YT</button>
        </div>
    </div>

    <div class="card">
        <h2>📌 Lista de Tareas</h2>
        <div class="todo-item"><input type="checkbox"> Revisar entregas de la UNGS</div>
        <div class="todo-item"><input type="checkbox"> Testing de aplicaciones locales</div>
        <div class="todo-item"><input type="checkbox"> Organizar componentes de hardware</div>
        <div class="todo-item"><input type="checkbox"> Backup de base de datos</div>
    </div>

    <div class="card" style="grid-row: span 2;">
        <h2>📝 Block de Notas</h2>
        <textarea placeholder="Pegá tus scripts, comandos de terminal o recordatorios acá..."></textarea>
    </div>

    <div class="card">
        <h2>🚀 Herramientas</h2>
        <div class="quick-links">
            <a href="https://github.com" target="_blank">GitHub</a>
            <a href="https://bolt.new" target="_blank">Bolt.new</a>
            <a href="https://lovable.dev" target="_blank">Lovable</a>
            <a href="https://web.whatsapp.com" target="_blank">WhatsApp</a>
        </div>
    </div>
</div>
